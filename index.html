<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaodong Li - Academic CV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ==================================================== */
        /* 全局样式与变量配置 */
        /* ==================================================== */
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --bg-color: #f8f9fa;
            --text-color: #333;
            --border-color: #e9ecef;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; color: var(--text-color); background-color: var(--bg-color); margin: 0; padding: 0; transition: all 0.3s ease; }
        
        /* 布局容器 */
        .container { max-width: 1050px; margin: 40px auto; background: #fff; padding: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 8px; display: flex; gap: 40px; position: relative; }
        .sidebar { flex: 0 0 260px; max-width: 260px; border-right: 2px solid var(--border-color); padding-right: 30px; }
        .main-content { flex: 1; min-width: 0; }

        /* 侧边栏模块 */
        .profile-img { width: 100%; max-width: 180px; border-radius: 8px; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; }
        .name-title h1 { font-size: 28px; color: var(--primary-color); margin: 0 0 5px 0; }
        .name-title h2 { font-size: 15px; color: var(--secondary-color); font-weight: 400; margin: 0 0 20px 0; }
        
        .contact-info { list-style: none; padding: 0; margin-bottom: 30px; }
        .contact-info li { margin-bottom: 12px; font-size: 13px; display: flex; align-items: center; }
        .contact-info i { width: 20px; color: var(--accent-color); margin-right: 10px; }
        .contact-info a { color: var(--text-color); text-decoration: none; word-break: break-all; }
        .contact-info a:hover { color: var(--accent-color); }

        .metrics { background: #f1f3f5; padding: 15px; border-radius: 6px; margin-bottom: 30px; }
        .metrics h3 { margin-top: 0; font-size: 15px; color: var(--primary-color); }
        .metric-item { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
        .metric-item span:last-child { font-weight: bold; color: var(--accent-color); }

        .skills-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .skill-tag { background: #e3f2fd; color: #1976d2; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }

        /* 主体内容模块 */
        section { margin-bottom: 35px; }
        h3.section-title { color: var(--primary-color); border-bottom: 2px solid var(--accent-color); padding-bottom: 8px; margin-top: 0; margin-bottom: 20px; font-size: 20px; }
        
        .item { margin-bottom: 22px; }
        .item-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
        .item-title { font-weight: 600; font-size: 17px; color: var(--primary-color); }
        .item-date { font-size: 14px; color: #666; font-weight: 500; }
        .item-subtitle { font-weight: bold; color: var(--secondary-color); margin-bottom: 8px; font-size: 15px;}
        .item-desc { margin: 0; font-size: 13.5px; color: #444; text-align: justify; line-height: 1.6;}
        
        /* 动态增加的荣誉样式 */
        .honors-box { background: #fff8e1; border-left: 4px solid #ffca28; padding: 10px 15px; margin-top: 15px; font-size: 13px; color: #555; border-radius: 0 4px 4px 0; }
        .summary-box { font-weight: 600; color: var(--primary-color); margin-bottom: 15px; font-size: 14px; }

        .tool-link { display: inline-block; margin-top: 5px; font-size: 13px; color: var(--accent-color); text-decoration: none; font-weight: 600; margin-right: 15px;}
        .tool-link:hover { text-decoration: underline; }

        .pub-list { list-style: none; padding: 0; margin: 0; }
        .pub-list li { margin-bottom: 15px; font-size: 14px; position: relative; padding-left: 20px; line-height: 1.6;}
        .pub-list li::before { content: "•"; color: var(--accent-color); position: absolute; left: 0; font-weight: bold; }
        .pub-title { font-weight: 600; color: #111;}
        .pub-journal { font-style: italic; color: var(--secondary-color); }
        .pub-if { background: #ffebee; color: #c62828; padding: 2px 6px; border-radius: 4px; font-size: 12px; margin-left: 5px; font-weight: bold; display: inline-block; }

        /* 悬浮控制按钮 */
        .controls { position: fixed; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .btn { background: var(--accent-color); color: white; padding: 12px 20px; border-radius: 30px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3); transition: all 0.3s ease; cursor: pointer; border: none; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:hover { background: #2980b9; transform: translateY(-2px); }
        .btn-lang { background: var(--primary-color); }
        .btn-lang:hover { background: #1a252f; }

        /* 语言切换逻辑 */
        [lang="zh"] { display: none; }
        body.zh-mode [lang="en"] { display: none; }
        body.zh-mode [lang="zh"] { display: inline-block; }
        body.zh-mode div[lang="zh"], body.zh-mode p[lang="zh"], body.zh-mode ul[lang="zh"], body.zh-mode li[lang="zh"], body.zh-mode h1[lang="zh"], body.zh-mode h2[lang="zh"], body.zh-mode h3[lang="zh"] { display: block; }

        /* PDF 打印适配 */
        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body { background-color: #fff; font-size: 10.5pt; }
            .controls { display: none !important; }
            
            .container { box-shadow: none !important; margin: 0 !important; padding: 0 !important; width: 100% !important; max-width: 100% !important; display: block !important; }
            .sidebar { width: 100% !important; max-width: 100% !important; border-right: none !important; border-bottom: 2px solid var(--primary-color) !important; padding-right: 0 !important; padding-bottom: 15px !important; margin-bottom: 25px !important; }
            .sidebar::after { content: ""; display: table; clear: both; }

            .profile-img { float: right; width: 110px !important; max-width: 110px !important; margin: 0 0 10px 20px !important; }
            .name-title h2 { margin-bottom: 10px !important; }
            
            .contact-info { display: flex !important; flex-wrap: wrap !important; gap: 5px 20px !important; margin-bottom: 10px !important; }
            .contact-info li { margin-bottom: 0 !important; }

            .metrics { background: transparent !important; padding: 0 !important; margin-bottom: 10px !important; display: flex !important; gap: 20px !important; }
            .metrics h3 { display: none !important; } 
            .metric-item { margin-bottom: 0 !important; font-size: 12pt; }
            .metric-item span:first-child::after { content: ": "; } 

            .sidebar section { margin-bottom: 0 !important; }
            .sidebar h3.section-title { display: none !important; } 
            .skills-container { margin-bottom: 5px !important; }

            .main-content { width: 100% !important; margin-left: 0 !important; padding-left: 0 !important; display: block !important; }
            .item, .pub-list li, .honors-box { page-break-inside: avoid; break-inside: avoid; }

            @page { margin: 1cm 1.5cm; size: A4 portrait; }
        }

        /* 移动端响应式 */
        @media (max-width: 768px) {
            .container { flex-direction: column; padding: 20px; margin: 10px; display: flex; }
            .sidebar { max-width: 100%; flex: 1; border-right: none; border-bottom: 2px solid var(--border-color); padding-right: 0; padding-bottom: 20px; }
            .controls { bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn btn-lang" onclick="toggleLanguage()">
            <i class="fas fa-language"></i> <span id="lang-btn-text">中文 / EN</span>
        </button>
        <button class="btn" onclick="window.print()">
            <i class="fas fa-file-pdf"></i> 
            <span lang="en">Download CV</span>
            <span lang="zh">下载简历</span>
        </button>
    </div>

    <div id="loading" style="text-align:center; padding: 100px; font-size: 20px; color: #666;">
        <i class="fas fa-spinner fa-spin"></i> Loading CV Data...
    </div>

    <div class="container" id="cv-container" style="display: none;">
        <div class="sidebar" id="sidebar-container"></div>
        <div class="main-content" id="main-container"></div>
    </div>

    <script>
        // ----------------------------------------------------
        // 语言切换与持久化逻辑
        // ----------------------------------------------------
        function toggleLanguage() {
            const body = document.body;
            body.classList.toggle('zh-mode');
            localStorage.setItem('cv-lang', body.classList.contains('zh-mode') ? 'zh' : 'en');
        }

        function initLanguage() {
            const savedLang = localStorage.getItem('cv-lang');
            if (savedLang === 'zh' || (!savedLang && navigator.language.startsWith('zh'))) {
                document.body.classList.add('zh-mode');
            }
        }

        // ----------------------------------------------------
        // 数据加载与动态渲染引擎
        // ----------------------------------------------------
        async function loadCVData() {
            try {
                // 核心：读取同目录下的 data.json
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('Failed to load JSON');
                const data = await response.json();
                
                renderSidebar(data);
                renderMainContent(data);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('cv-container').style.display = 'flex';
                initLanguage();

            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <div style="color: #e74c3c;">
                        <i class="fas fa-exclamation-triangle"></i> Data loading failed.<br>
                        <small style="font-size:14px; color:#666;">
                            If you are viewing this locally (file://), browsers block JSON fetching for security.<br>
                            Please use a Local Server (e.g. VS Code Live Server) or deploy to GitHub Pages.
                        </small>
                    </div>`;
                console.error("JSON fetch error:", error);
            }
        }

        // --- 渲染侧边栏 ---
        function renderSidebar(data) {
            const sidebar = document.getElementById('sidebar-container');
            const p = data.personal_info;
            
            let html = `
                <img src="${p.avatar}" alt="Avatar" class="profile-img">
                <div class="name-title">
                    <h1><span lang="en">${p.name_en}</span><span lang="zh">${p.name_zh}</span></h1>
                    <h2><span lang="en">${p.title_en}</span><span lang="zh">${p.title_zh}</span></h2>
                </div>
                <ul class="contact-info">
                    <li><i class="fas fa-map-marker-alt"></i><span lang="en">${p.location_en}</span><span lang="zh">${p.location_zh}</span></li>
                    <li><i class="fas fa-envelope"></i> <a href="mailto:${p.email}">${p.email}</a></li>
                    <li><i class="fab fa-github"></i> <a href="${p.github_url}" target="_blank">${p.github}</a></li>
                    <li><i class="fab fa-orcid"></i> <a href="${p.orcid_url}" target="_blank">${p.orcid}</a></li>
                    <li><i class="fas fa-id-card"></i> Web of Science: ${p.wos}</li>
                </ul>
            `;

            if (data.metrics && data.metrics.show) {
                html += `
                <div class="metrics">
                    <h3><span lang="en">Academic Metrics</span><span lang="zh">学术指标</span></h3>
                    <div class="metric-item"><span lang="en">Total Publications</span><span lang="zh">总发文量</span><span>${data.metrics.total_publications}</span></div>
                    <div class="metric-item"><span lang="en">H-index</span><span lang="zh">H指数</span><span>${data.metrics.h_index}</span></div>
                    <div class="metric-item"><span lang="en">Sum of Times Cited</span><span lang="zh">总被引频次</span><span>${data.metrics.times_cited}</span></div>
                </div>`;
            }

            if (data.expertise && data.expertise.show) {
                html += `
                <section>
                    <h3 class="section-title"><span lang="en">Core Expertise</span><span lang="zh">核心专长</span></h3>
                    <div class="skills-container" lang="en">${data.expertise.tags_en.map(t => `<span class="skill-tag">${t}</span>`).join('')}</div>
                    <div class="skills-container" lang="zh">${data.expertise.tags_zh.map(t => `<span class="skill-tag">${t}</span>`).join('')}</div>
                </section>`;
            }
            sidebar.innerHTML = html;
        }

        // --- 渲染主体内容 ---
        function renderMainContent(data) {
            const main = document.getElementById('main-container');
            let html = '';

            // 1. 教育经历 (Education)
            if (data.education && data.education.show) {
                let eduHtml = '';
                data.education.items.forEach(item => {
                    eduHtml += `
                    <div class="item">
                        <div class="item-header">
                            <span class="item-title"><span lang="en">${item.school_en}</span><span lang="zh">${item.school_zh}</span></span>
                            <span class="item-date"><span lang="en">${item.date_en}</span><span lang="zh">${item.date_zh}</span></span>
                        </div>
                        <div class="item-subtitle"><span lang="en">${item.degree_en}</span><span lang="zh">${item.degree_zh}</span></div>
                    </div>`;
                });
                // 插入荣誉区块
                eduHtml += `
                    <div class="honors-box">
                        <i class="fas fa-award"></i> 
                        <span lang="en">${data.education.honors_en}</span>
                        <span lang="zh">${data.education.honors_zh}</span>
                    </div>`;
                html += renderSection(data.education, eduHtml);
            }

            // 2. 代表性成果 (Representative Achievements)
            if (data.achievements && data.achievements.show) {
                let achHtml = `
                    <div class="summary-box">
                        <i class="fas fa-chart-line"></i> 
                        <span lang="en">${data.achievements.summary_en}</span>
                        <span lang="zh">${data.achievements.summary_zh}</span>
                    </div>
                    <ul class="pub-list">`;
                data.achievements.items.forEach(pub => {
                    achHtml += `
                    <li>
                        <span class="pub-title">${pub.title}</span><br>
                        ${pub.authors}<br>
                        <span class="pub-journal">${pub.journal}</span> (${pub.year}). DOI: ${pub.doi} 
                        <span class="pub-if">${pub.if_info}</span>
                    </li>`;
                });
                achHtml += `</ul>`;
                html += renderSection(data.achievements, achHtml);
            }

            // 3. 科研项目 (Research Projects)
            if (data.projects && data.projects.show && data.projects.items.length > 0) {
                let projHtml = `<ul class="pub-list">`;
                data.projects.items.forEach(p => {
                    projHtml += `<li>${p.content}</li>`;
                });
                projHtml += `</ul>`;
                html += renderSection(data.projects, projHtml);
            }

            // 4. 同行评审 (Peer Review)
            if (data.peer_review && data.peer_review.show) {
                let prHtml = `<ul class="pub-list">`;
                data.peer_review.items.forEach(pr => {
                    prHtml += `
                    <li>
                        <strong lang="en">Journal:</strong><strong lang="zh">期刊：</strong> <em>${pr.journal}</em> 
                        | ISSN: ${pr.issn} | 
                        <span lang="en">Review date:</span><span lang="zh">审稿时间：</span> ${pr.date} | 
                        Type: ${pr.type} | Role: ${pr.role}
                    </li>`;
                });
                prHtml += `</ul>`;
                html += renderSection(data.peer_review, prHtml);
            }

            // 5. 个人技能/生信工具 (Personal Skills)
            if (data.skills && data.skills.show) {
                let skillsHtml = '';
                data.skills.items.forEach(tool => {
                    let linksHtml = '';
                    if (tool.links) {
                        tool.links.forEach(link => {
                            linksHtml += `<a href="${link.url}" class="tool-link" target="_blank"><i class="${link.icon}"></i> ${link.text}</a>`;
                        });
                    }
                    skillsHtml += `
                    <div class="item">
                        <div class="item-subtitle">${tool.name}</div>
                        <p class="item-desc" lang="en">${tool.desc_en}</p>
                        <p class="item-desc" lang="zh">${tool.desc_zh}</p>
                        <div>${linksHtml}</div>
                    </div>`;
                });
                html += renderSection(data.skills, skillsHtml);
            }

            main.innerHTML = html;
        }

        // 辅助函数：生成通用 Section 骨架
        function renderSection(sectionData, contentHtml) {
            return `
            <section>
                <h3 class="section-title">
                    <span lang="en">${sectionData.title_en}</span>
                    <span lang="zh">${sectionData.title_zh}</span>
                </h3>
                ${contentHtml}
            </section>`;
        }

        // 页面加载完成后执行
        window.addEventListener('DOMContentLoaded', loadCVData);

    </script>
</body>
</html>
